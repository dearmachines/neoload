name: Release

on:
  push:
    tags:
      - "20[0-9][0-9].[0-9][0-9].[0-9][0-9]*"

permissions:
  contents: write

jobs:
  build:
    name: Build and release
    runs-on: ubuntu-latest

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            ext: .exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: cli/go.mod

      - name: Build
        working-directory: cli
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
          VERSION: ${{ github.ref_name }}
        run: |
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
            -o ../dist/neoload-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }} \
            ./cmd/neoload

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: neoload-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/neoload-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.ext || '' }}

  release:
    name: Create release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
